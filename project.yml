name: Riddle
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  RiddleKit:
    path: RiddleKit
targets:
  Riddle:
    type: application
    platform: iOS
    sources:
      - path: RiddleApp
    dependencies:
      - package: RiddleKit
        product: RiddleKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.tomriddlediary
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        # Set to your 10-character Apple Developer Team ID (Xcode > Settings > Accounts).
        DEVELOPMENT_TEAM: ""
        # NOTE: headless simulator builds pass CODE_SIGNING_ALLOWED=NO on the
        # xcodebuild command line; device builds sign normally via automatic signing.
