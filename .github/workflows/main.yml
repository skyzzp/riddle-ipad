name: Build Riddle iPad

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: List Files
        run: |
          pwd
          ls -la
          find . -name "*.xcodeproj"

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project Riddle.xcodeproj
            
      - name: List Schemes
        run: |
          xcodebuild -list -project Riddle.xcodeproj
          
      - name: Build
        run: |
          xcodebuild \
            -project Riddle.xcodeproj \
            -scheme Riddle \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Riddle-Build
          path: .
